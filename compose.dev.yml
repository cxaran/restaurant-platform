name: restaurant-platform-dev

x-backend-environment: &backend-environment
  ENVIRONMENT: local
  SECRET_KEY: dev-secret-key-change-me
  # Orígenes de navegador confiables para CSRF. Por defecto solo localhost; para probar
  # desde otro dispositivo en la LAN, exporta TRUSTED_BROWSER_ORIGINS incluyendo el
  # origen LAN (p. ej. "http://localhost:3000,http://192.168.0.213:3000").
  TRUSTED_BROWSER_ORIGINS: ${TRUSTED_BROWSER_ORIGINS:-http://localhost:3000}
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  EMAIL_TOKEN_EXPIRE_MINUTES: "30"
  TRYS_BEFORE_LOCK: "5"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_USER: dev@example.com
  SMTP_PASSWORD: dev-password
  SMTP_FROM_EMAIL: dev@example.com
  SMTP_FROM_NAME: Restaurant Platform Dev
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_CREDENTIALS: "false"
  POSTGRES_USER: platform
  POSTGRES_PASSWORD: platform
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: restaurant_platform

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    # PostGIS: el dominio restaurante usa geometrías (zonas de reparto, ubicaciones).
    # La extensión se activa vía migración (CREATE EXTENSION IF NOT EXISTS postgis).
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: restaurant_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    image: restaurant-platform-backend:dev
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    expose:
      - "1025"
    restart: unless-stopped

  migrate:
    image: restaurant-platform-backend:dev
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Tareas en segundo plano (Taskiq sobre PostgreSQL). Worker y scheduler con profile
  # explícito "taskiq" (docker compose --profile taskiq up taskiq-worker taskiq-scheduler);
  # `docker compose up` normal no los levanta. UNA sola réplica del scheduler.
  taskiq-worker:
    image: restaurant-platform-backend:dev
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    command: [ "taskiq", "worker", "backend.app.taskiq_app:broker", "--workers", "1", "--max-async-tasks", "1" ]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    # Primer arranque: worker y scheduler pueden correr a la vez el CREATE TABLE IF NOT
    # EXISTS del broker y Postgres lanza UniqueViolation en pg_type (carrera conocida);
    # el reinicio la absorbe (la tabla ya existe en el segundo intento).
    restart: unless-stopped

  taskiq-scheduler:
    image: restaurant-platform-backend:dev
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    command: [ "taskiq", "scheduler", "backend.app.taskiq_app:scheduler", "--skip-first-run" ]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # Documentación (mismo servicio que en prod, pero con puerto publicado porque
  # el stack de dev no tiene nginx). Preview: http://localhost:8030/docs/
  docs:
    image: squidfunk/mkdocs-material:9
    # --livereload EXPLÍCITO: con click >= 8.2 el default del flag en mkdocs 1.6
    # queda falsy y `serve` deja de vigilar archivos (sin él no hay rebuild).
    command: [ "serve", "--livereload", "--dev-addr=0.0.0.0:8000" ]
    volumes:
      - ./mkdocs.yml:/docs/mkdocs.yml:ro
      - ./docs:/docs/docs:ro
    ports:
      - "${DOCS_PORT:-8030}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    image: restaurant-platform-frontend:dev
    environment:
      API_PROXY_TARGET: http://backend:8000
      BACKEND_INTERNAL_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
      # Orígenes extra que el dev server de Next acepta (HMR/assets) al entrar desde la
      # LAN. CSV; vacío por defecto. Ej.: DEV_ALLOWED_ORIGINS=192.168.0.213
      DEV_ALLOWED_ORIGINS: ${DEV_ALLOWED_ORIGINS:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  redis_data:
  postgres_data:
  frontend_node_modules:
  frontend_next:
