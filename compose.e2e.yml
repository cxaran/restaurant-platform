name: restaurant-platform-e2e

x-backend-environment: &backend-environment
  ENVIRONMENT: local
  SECRET_KEY: e2e-secret-key-change-me
  # Además del nginx del stack (31080), se confía en el dev server local del
  # frontend (next dev en :3000 proxyeando /api a este stack): sin él, toda
  # mutación desde el dev server muere en el CSRF con 403 csrf_origin_invalid.
  TRUSTED_BROWSER_ORIGINS: http://127.0.0.1:31080,http://localhost:3000,http://127.0.0.1:3000
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  EMAIL_TOKEN_EXPIRE_MINUTES: "30"
  TRYS_BEFORE_LOCK: "5"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_USER: e2e@example.com
  SMTP_PASSWORD: e2e-password
  SMTP_FROM_EMAIL: e2e@example.com
  SMTP_FROM_NAME: Restaurant Platform E2E
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_CREDENTIALS: "false"
  POSTGRES_USER: platform
  POSTGRES_PASSWORD: platform
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: restaurant_platform_e2e_test
  # Rate limiting: límites generosos para no interferir con los flujos del E2E,
  # salvo un bucket de forgot-password bajo para probar el bloqueo determinista.
  RATE_LIMIT_LOGIN_IP: "100/900"
  RATE_LIMIT_LOGIN_IDENTITY: "100/900"
  RATE_LIMIT_BOOTSTRAP_IP: "100/900"
  RATE_LIMIT_FORGOT_IP: "2/900"
  RATE_LIMIT_FORGOT_IDENTITY: "100/3600"
  RATE_LIMIT_REGISTER_REQUEST_IP: "100/3600"
  RATE_LIMIT_REGISTER_REQUEST_IDENTITY: "100/3600"
  # Registro habilitado SOLO en el entorno E2E aislado para cubrir el happy path.
  REGISTRATION_ENABLED: "true"

services:
  redis:
    image: redis:7-alpine
    tmpfs:
      - /data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 12

  postgres:
    # Misma base que dev: PostGIS para las migraciones del dominio restaurante.
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: restaurant_platform_e2e_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ./backend
      target: prod
    image: restaurant-platform-backend:e2e
    environment:
      <<: *backend-environment
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"

  migrate:
    build:
      context: ./backend
      target: prod
    image: restaurant-platform-backend:e2e
    environment:
      <<: *backend-environment
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: prod
    image: restaurant-platform-frontend:e2e
    environment:
      API_PROXY_TARGET: http://backend:8000
      BACKEND_INTERNAL_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:31080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  # Jobs en segundo plano (publicación programada del storefront, expiración de
  # pedidos, purgas): mismos binarios que el backend, perfil opt-in "taskiq".
  taskiq-worker:
    build:
      context: ./backend
      target: prod
    image: restaurant-platform-backend:e2e
    profiles: [ "taskiq" ]
    environment:
      <<: *backend-environment
    command: [ "taskiq", "worker", "backend.app.taskiq_app:broker", "--workers", "1", "--max-async-tasks", "1" ]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  taskiq-scheduler:
    build:
      context: ./backend
      target: prod
    image: restaurant-platform-backend:e2e
    profiles: [ "taskiq" ]
    environment:
      <<: *backend-environment
    command: [ "taskiq", "scheduler", "backend.app.taskiq_app:scheduler", "--skip-first-run" ]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  mailpit:
    image: axllent/mailpit:latest
    expose:
      - "1025"
    # API HTTP solo en loopback del host para que Playwright lea tokens en E2E.
    ports:
      - "127.0.0.1:31025:8025"
