name: restaurant-platform

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    image: restaurant-platform-backend:prod
    # El dominio público se declara en el asistente de /setup y vive en la
    # configuración del sistema; TRUSTED_BROWSER_ORIGINS es un override OPCIONAL
    # (CSV de orígenes https) para añadir orígenes confiables por entorno.
    env_file: ${APP_ENV_FILE:-.env}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    image: restaurant-platform-frontend:prod
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  migrate:
    image: restaurant-platform-backend:prod
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    # El Postgres externo debe tener disponible la extensión PostGIS (paquete
    # postgis instalado); la migración ejecuta CREATE EXTENSION IF NOT EXISTS postgis.
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]

  # Tareas en segundo plano (Taskiq sobre PostgreSQL). Worker y scheduler son procesos
  # PROPIOS con profile explícito "taskiq"; `docker compose up` normal no los levanta.
  # UNA sola réplica del scheduler.
  taskiq-worker:
    image: restaurant-platform-backend:prod
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "taskiq", "worker", "backend.app.taskiq_app:broker", "--workers", "1", "--max-async-tasks", "1" ]
    # El primer arranque puede chocar con el scheduler creando la tabla del broker a la
    # vez (UniqueViolation en pg_type); el reinicio lo absorbe.
    restart: unless-stopped

  taskiq-scheduler:
    image: restaurant-platform-backend:prod
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "taskiq", "scheduler", "backend.app.taskiq_app:scheduler", "--skip-first-run" ]
    restart: unless-stopped

volumes:
  redis_data:
