server {
    listen 80;

    location /api/ {
        # Subidas multipart (/api/v1/files): el perfil más grande del backend
        # acepta 10 MB (document); con margen para el overhead multipart. Sin
        # esto nginx corta en su default de 1 MB con un 413 en HTML que el
        # cliente no puede interpretar.
        client_max_body_size 12m;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentación (MkDocs). El dev server de MkDocs ya sirve bajo /docs/
    # (sub-path de site_url), así que el prefijo se pasa tal cual. Los headers
    # Upgrade cubren el livereload que reconstruye al editar los .md.
    # absolute_redirect off: Location relativo (/docs/), que conserva puerto y
    # esquema del cliente aunque HTTP_PORT no sea 80 o haya TLS por delante.
    location = /docs { absolute_redirect off; return 302 /docs/; }

    # El auto-refresh de MkDocs sondea /livereload/... en la RAÍZ (no bajo
    # /docs/); sin esta ruta el long-poll cae al frontend y la pestaña de docs
    # no se recarga sola tras un rebuild.
    location /livereload/ {
        proxy_pass http://docs:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /docs/ {
        proxy_pass http://docs:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
