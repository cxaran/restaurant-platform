server {
    listen 80;

    location /api/ {
        # Subidas multipart (/api/v1/files): el perfil más grande del backend
        # acepta 10 MB (document); con margen para el overhead multipart. Sin
        # esto nginx corta en su default de 1 MB con un 413 en HTML que el
        # cliente no puede interpretar.
        client_max_body_size 12m;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
